project:
  type: website
  output-dir: _public
# Comment first lines to make faster previews
  render:
    - index.qmd
    - "01_R_Insee/*.qmd"
    - "02_Bonnes_pratiques/*.qmd"
    - "03_Fiches_thematiques/*.qmd"
    - "!04_misc/"
    - "!cards/"
    - "!rv/"

comments:
  hypothesis: true

website:
